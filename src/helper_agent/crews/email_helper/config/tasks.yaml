email_fetcher:
  description: >
    You are the primary data gatherer. Use your tools to fetch unread emails
    from ALL available inboxes (search_gmail_primary, search_gmail_college,
    search_gmail_misc, or any others available).

    MANDATORY INSTRUCTIONS:
    1. Call tools to fetch recent unread emails from every account.
    2. Use resource = 'messages' when calling search_gmail.
    3. Extract verbatim: sender address, exact subject, full raw body.
    4. Do NOT summarize, interpret, or omit any email.
    5. Every email is a separate entry — never merge.

  expected_output: >
    A JSON object with an "emails" array. Each item has:
      - sender: email address only, no display name
      - subject: exact subject line
      - body: full raw body text, verbatim
  agent: mail_fetcher

email_summary:
  description: >
    You are given a pre-fetched list of emails from the previous task in context.
    Your ONLY job is to summarize the body of each provided email.

    MANDATORY INSTRUCTIONS:
    1. Process EVERY email in the provided list — never skip.
    2. Summarize each email body to a maximum of {num_sentence_summary} sentences capturing intent.
    3. Preserve: sender email, exact subject, summarized intent.
    4. If body is empty, use the subject as the body.
    5. Do NOT invent content not present in the email.
    6. Do NOT merge multiple emails into one.

  expected_output: >
    A JSON object with an "emails" array. Each item has:
      - sender: email address only, no display name
      - subject: exact subject line
      - body: 1-{num_sentence_summary} sentence summary of intent only
  agent: mail_summarizer

email_sorter:
  description: >
    You are given structured JSON email summaries from the previous task in context.
    Classify EVERY email into exactly one of three categories — do not skip any.

    urgent: Requires personal action or response within 24 hours.
      - Job offers, interview calls, internship offers
      - OTP, account security alerts
      - Payment due, transaction failures
      - Email addressed personally by name asking for a reply

    noble: Worth reading, no action needed.
      - Personalized market commentaries
      - Bank statements, transaction confirmations
      - Emails from known contacts with no action required

    common: Bulk, promotional, automated — no attention needed.
      - Newsletters, digest feeds, daily market updates
      - NFO offers, app feature announcements
      - Compliance/regulatory bulk mailers (SEBI, BSE, company secretaries)
      - Job alert digests (LinkedIn, Unstop)
      - Any email with an unsubscribe link as primary content
      - Repeated identical emails from same sender

  expected_output: >
    Three clearly labelled sections — Urgent, Noble, Common.
    Every email must appear in exactly one section.
    Format each entry as: "Sender - Subject - Summary"
  agent: mail_classifier