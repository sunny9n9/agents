data_gathering_task:
  description: >
    The user's specific question is: "{user_question}"
    You are gathering data for: {stock}

    Step 1: FETCH TICKER & LATEST NEWS
    Search DuckDuckGo to get the ticker symbol for {stock} and recent major news (last 3 months) specifically regarding stock splits, corporate actions, or earnings misses. 
    Search yf_search() with the ticker of stock to get financial news
    
    Step 2: FETCH CURRENT VALUATION METRICS (CROSS-VALIDATION REQUIRED)
    Search for "{stock} current share price P/E P/B" on BOTH screener.in and moneycontrol.com/tickertape.in.
    You MUST extract the current share price from at least TWO different sources. If the prices differ by more than 2%, explicitly flag this discrepancy in your report.

    Step 3: FETCH FUNDAMENTAL FINANCIAL DATA
    Scrape the most data-rich pagefor further information.

  expected_output: >
    A structured report containing:
    1. Confirmed Ticker & Multi-Source Price Check (State the prices found and sources).
    2. Corporate Actions (Explicitly state if any stock splits or bonuses occurred recently to explain price anomalies).
    3. Cleaned Financial Metrics (FY24).
    4. Recent News.
  agent: DataGatherer

value_analysis_task:
  description: >
    The user's specific question is: "{user_question}". Frame your entire value 
    analysis in context of this scenario for {stock}.
    
    Identify the sector of underlying stock and then query your knowledge base for how to analyze this sector.
    Consult your internal knowledge base literature for queries about strategies 
    Review and break down the gathered financial data and market context for: "{stock}". 
    (specifically pulling insights from Parag Parikh's frameworks). 
    Evaluate the core risks, structural behavior traps, and valuation margins of safety associated with this equity.
  expected_output: >
    A strict, conservative analysis of '{stock}', detailing specific defensive value metrics 
    and behavioral warning signs to watch out for.
  agent: MarginOfSafetyInvestor

growth_synthesis_task:
  description: >
    The user's specific question is: "{user_question}". Frame your growth analysis 
    specifically around whether this scenario for {stock} presents an opportunity 
    or a trap.
    Identify the sector of underlying stock and then query your knowledge base for how to analyze this sector.
    Consult your internal knowledge base literature if there is any query you have about strategy concept or applications
    Review and break down the gathered financial data and market context for: "{stock}". 
    (specifically pulling insights from Saurabh Mukherjea's Coffee Can parameters). 
    Analyse the potential of given stock for delivering exponential returns and factors which might lead to it.
  expected_output: >
    A final, comprehensive investment consultation that clearly weights the advantage of taking position in given
    stock, and potential opportunity loss probability it may incur if execution is not followed through.
  agent: HighGrowthInvestor

final_response_task:
  description: >
    Review the original user question: "{user_question}" for stock {stock}. Examine the parallel financial 
    evaluations delivered by both the MarginOfSafetyInvestor and the HighGrowthInvestor. 
    
    The user possesses an intermediate-to-advanced understanding of investment finance. 
    Do NOT abstract away formulas, omit specific numbers, or summarize technical concepts into generic takeaways. 
    You must fully preserve and cleanly integrate the explicit mathematical ratios, valuation margins of safety, 
    ROCE thresholds, and behavioral traps pulled directly from Parag Parikh's and Saurabh Mukherjea's frameworks.
    
    Verify that:
    1. The analysis provides an explicit, unequivocal, quantitative answer to the user's specific problem.
    2. The core insights from all discovered investment texts in the knowledge base are preserved without data dilution.
    3. The tone remains professional, mathematically rigorous, objective, and clear.
  expected_output: >
    A completely vetted, data-dense final investment brief that directly resolves the user's specific scenario using intermediate financial terminology and raw quantitative data points.
  agent: FinalResponseGenerator