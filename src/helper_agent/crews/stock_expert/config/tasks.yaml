portfolio_management_task:
  description: >
    Review the primary client objective: "{user_question}" for {stock}. Assess the raw 
    analytical dossiers provided independently by your value and growth research teams.
    
    1. CONFLICT ADVISORY & ALLOCATION MAPPING: Review the data to see where your analyst 
       frameworks clash. If the MarginOfSafetyInvestor and HighGrowthInvestor diverge on {stock}, 
       do not force an artificial consensus. Map out the precise structural friction (e.g., 
       "The company passes historical Coffee Can growth criteria but completely fails conservative 
       Margin of Safety valuation limits").
    2. QUANTITATIVE INTEGRATION: Ensure zero loss of technical depth. Maintain explicit formulas, 
       numerical ROCE metrics, pricing-power data, and valuation ceilings intact. 
    3. INTERACTIVE ADVISORY PREPARATION: Format this output so it serves both as a definitive 
       multi-strategy report and the immediate memory foundation for follow-up conversational chat 
       turns. If this is a real-time message stream loop, address the query using the existing data 
       pool in your memory without attempting to rerun the scraping or extraction pipelines.
  expected_output: >
    A data-dense, professional PMS allocation brief that presents an uncompromised, parallel 
    view of both Value and Growth metrics, delivering a definitive technical breakdown of 
    how the asset fits into distinct investment mandates.
  agent: PersonalPortfolioManager