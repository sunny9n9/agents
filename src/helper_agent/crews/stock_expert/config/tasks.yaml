data_gathering_task:
  description: >
    You primarily use three tools for searching about {stock}:
    1. YahooFinanceNewsTool - to get articles curated for finance applications (remember to pass .NS after ticker for Indian stocks).
    2. DuckDuckGoSearchRun - to perform general internet searches for specific information.
    3. ScrapeWebsiteTool - to visit any link you suspect could provide a goldmine of information.
    
    Gather and return all information that might prove crucial for the firm's decision-making regarding {stock}.
  expected_output: >
    A comprehensive bulleted list of recent news, financial metrics, and structural updates regarding {stock}.
  agent: DataGatherer

value_analysis_task:
  description: >
    Review and break down the gathered financial data and market context for: "{stock}". 
    Consult your internal knowledge base literature (specifically pulling insights from Parag Parikh's frameworks). 
    Evaluate the core risks, structural behavior traps, and valuation margins of safety associated with this equity.
  expected_output: >
    A strict, conservative analysis of '{stock}', detailing specific defensive value metrics 
    and behavioral warning signs to watch out for.
  agent: MarginOfSafetyInvestor

growth_synthesis_task:
  description: >
    Review the value analysis provided by the MarginOfSafetyInvestor regarding "{stock}". 
    Cross-reference this discussion with your internal growth-compounding knowledge base framework 
    (specifically pulling insights from Saurabh Mukherjea's Coffee Can parameters like ROCE thresholds and revenue scaling). 
    Synthesize the conservative warning flags with immediate expansion or compounding catalysts to finalize a balanced response.
  expected_output: >
    A final, comprehensive investment consultation that clearly weights the defensive margin of safety patterns 
    (from Parag Parikh) directly against the high-growth checklist constraints (from Saurabh Mukherjea).
  agent: HighGrowthInvestor