data_gathering_task:
  description: >
    The user's specific question is: "{user_question}"
    Target stock: {stock}.
    Pass links one at a time to the scraping tool.

    ### STEP 1: PRIORITY ALERT SCAN
    Search DuckDuckGo for "{stock} news today", "{stock} exchange notice BSE NSE",
    "{stock} internal probe OR fraud OR penalty OR RBI action 2025 2026".
    If ANY governance, regulatory, or fraud-related result appears, fetch that 
    article IMMEDIATELY. Do not proceed until this scan is complete.

    ### STEP 2: DISCOVER AND SCRAPE FINANCIAL PLATFORMS
    Search DuckDuckGo for the exact URLs of {stock} on screener.in and tickertape.in.
    Scrape BOTH URLs. Extract every single number and data point visible on the page.
    Do not filter, do not summarize — dump everything.

    ### STEP 3: EARNINGS DEEP DIVE
    From the scraped pages, find the most recent earnings call transcript 
    and/or investor presentation link. Fetch and read it.
    Dump all management commentary, guidance, risk mentions, and one-time items verbatim or near-verbatim.

    ### STEP 4: CORPORATE ACTIONS
    Search for any stock splits, bonus issues, mergers, or acquisitions in the 
    last 24 months.

  expected_output: >
    A raw, exhaustive data dump of everything retrieved. No summarization, 
    no filtering, no interpretation. Include every number, every metric, every 
    management quote, every news headline with its source URL. 
    If a piece of data was on the page, it must be in this output.
  agent: DataGatherer

